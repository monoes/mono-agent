name: Auto Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: version
        run: |
          LAST=$(git tag --sort=-v:refname | head -1)
          if [ -z "$LAST" ]; then
            NEXT="v0.1.0"
          else
            MAJOR=$(echo "$LAST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LAST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LAST" | sed 's/v//' | cut -d. -f3)
            # Bump minor when any commit since last tag starts with "feat:"
            if git log --oneline "${LAST}..HEAD" | grep -qE '^[0-9a-f]+ feat(\(.+\))?:'; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "prev=$LAST" >> "$GITHUB_OUTPUT"
          echo "Bumping $LAST → $NEXT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make build-all

      - name: Generate release notes
        id: notes
        run: |
          PREV="${{ steps.version.outputs.prev }}"
          TAG="${{ steps.version.outputs.tag }}"
          if [ -z "$PREV" ]; then
            COMMITS=$(git log --oneline --no-decorate)
          else
            COMMITS=$(git log --oneline --no-decorate "${PREV}..HEAD")
          fi

          # Separate commits by type
          FEATS=$(echo "$COMMITS"   | grep -E '^[0-9a-f]+ feat(\(.+\))?:'   | sed 's/^[0-9a-f]* //')
          FIXES=$(echo "$COMMITS"   | grep -E '^[0-9a-f]+ fix(\(.+\))?:'    | sed 's/^[0-9a-f]* //')
          DOCS=$(echo "$COMMITS"    | grep -E '^[0-9a-f]+ docs?(\(.+\))?:'  | sed 's/^[0-9a-f]* //')
          BUILDS=$(echo "$COMMITS"  | grep -E '^[0-9a-f]+ build(\(.+\))?:'  | sed 's/^[0-9a-f]* //')
          OTHERS=$(echo "$COMMITS"  | grep -vE '^[0-9a-f]+ (feat|fix|docs?|build)(\(.+\))?:' | sed 's/^[0-9a-f]* //')

          {
            echo 'NOTES<<RELEASE_EOF'
            echo "## What's New in ${TAG}"
            echo ""

            if [ -n "$FEATS" ]; then
              echo "### ✨ New Features"
              echo "$FEATS" | while read -r line; do
                # Pretty-print: strip "feat: " / "feat(scope): " prefix
                pretty=$(echo "$line" | sed 's/^feat([^)]*): //' | sed 's/^feat: //')
                echo "- $pretty"
              done
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES" | while read -r line; do
                pretty=$(echo "$line" | sed 's/^fix([^)]*): //' | sed 's/^fix: //')
                echo "- $pretty"
              done
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### 📚 Documentation"
              echo "$DOCS" | while read -r line; do
                pretty=$(echo "$line" | sed 's/^docs\?([^)]*): //' | sed 's/^docs\?: //')
                echo "- $pretty"
              done
              echo ""
            fi

            if [ -n "$BUILDS" ]; then
              echo "### 🔧 Build & CI"
              echo "$BUILDS" | while read -r line; do
                pretty=$(echo "$line" | sed 's/^build([^)]*): //' | sed 's/^build: //')
                echo "- $pretty"
              done
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### 🔄 Other Changes"
              echo "$OTHERS" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            echo "---"
            echo ""
            echo "## Install / Upgrade"
            echo ""
            echo '```bash'
            echo "# macOS (Apple Silicon)"
            echo "curl -fsSL https://github.com/monoes/mono-agent/releases/download/${TAG}/monoagent-darwin-arm64 -o monoagent && chmod +x monoagent && sudo mv monoagent /usr/local/bin/"
            echo ""
            echo "# macOS (Intel)"
            echo "curl -fsSL https://github.com/monoes/mono-agent/releases/download/${TAG}/monoagent-darwin-amd64 -o monoagent && chmod +x monoagent && sudo mv monoagent /usr/local/bin/"
            echo ""
            echo "# Linux (x86_64)"
            echo "curl -fsSL https://github.com/monoes/mono-agent/releases/download/${TAG}/monoagent-linux-amd64 -o monoagent && chmod +x monoagent && sudo mv monoagent /usr/local/bin/"
            echo '```'
            echo ""
            echo "> **Go install**"
            echo '> ```bash'
            echo "> go install github.com/monoes/mono-agent/cmd/monoes@${TAG}"
            echo '> ```'
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.NOTES }}
          files: |
            bin/monoagent-darwin-amd64
            bin/monoagent-darwin-arm64
            bin/monoagent-linux-amd64
            bin/monoagent-windows-amd64.exe

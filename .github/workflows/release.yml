name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make build-all

      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag (if any)
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-decorate)
          else
            COMMITS=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          {
            echo 'NOTES<<EOF'
            echo "## What's Changed"
            echo ""
            echo "$COMMITS" | while read -r line; do echo "- $line"; done
            echo ""
            echo "## Install"
            echo ""
            echo '```bash'
            echo "# macOS (Apple Silicon)"
            echo "curl -L https://github.com/nokhodian/mono-agent/releases/download/${GITHUB_REF_NAME}/monoes-darwin-arm64 -o monoes && chmod +x monoes"
            echo ""
            echo "# macOS (Intel)"
            echo "curl -L https://github.com/nokhodian/mono-agent/releases/download/${GITHUB_REF_NAME}/monoes-darwin-amd64 -o monoes && chmod +x monoes"
            echo ""
            echo "# Linux"
            echo "curl -L https://github.com/nokhodian/mono-agent/releases/download/${GITHUB_REF_NAME}/monoes-linux-amd64 -o monoes && chmod +x monoes"
            echo '```'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.NOTES }}
          files: |
            bin/monoes-darwin-amd64
            bin/monoes-darwin-arm64
            bin/monoes-linux-amd64
            bin/monoes-windows-amd64.exe
